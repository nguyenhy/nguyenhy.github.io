name: Build static pages

on:
  push:
    branches:
      - master

# Grant the page deployment permissions required by the native runner
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      - run: |
          VITE_DCMA=${{ vars.VITE_DCMA }} \
          VITE_GA4=${{ vars.VITE_GA4 }} \
          VITE_GTM=${{ vars.VITE_GTM }} \
          npm run build

      # 1. Upload the built 'dist' directory natively
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 2. Trigger the official deployment engine
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4